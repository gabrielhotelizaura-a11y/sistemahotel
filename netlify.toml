## Netlify config para monorepo/subpasta
## Faz o build dentro de `hotel-sync-fix-main` e publica o `dist` gerado lá
[build]
  command = "cd hotel-sync-fix-main && npm run build:production"
  publish = "hotel-sync-fix-main/dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_APP_ENV = "production"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
